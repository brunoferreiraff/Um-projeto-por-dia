<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Landing Page - Cafeteria</title>
</head>

<body>
    <!-- HEADER  -->
    <header>
        <nav class="navbar">
            <img src="/dia1/images/logo-starbucks.png" alt="logo do starbucks" class="logo">

            <button class="btn-mobile">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul id="nav-links">
                <li>
                    <a href="#home">Início</a>
                </li>
                <li>
                    <a href="#trending">Em alta</a>
                </li>
                <li><a href="#about">Sobre Nós</a></li>
                <li><a href="#products">Produtos</a></li>
            </ul>

            <a href="tel:" class="btn btn-default">Ligue agora</a>
        </nav>
    </header>

    <!-- HERO -->

    <main id="container">
        <section id="home">
            <img src="images/detail.png" alt="imagem de café" class="homeImage">
            <h1 class="home-title">
                Mais que café, uma <span>experiência.</span>
            </h1>

            <p class="home-description">
                Descubra cafés icônicos, sabores únicos e a energia perfeita para cada parte do seu dia.
            </p>
            <div class="home-actions">
                <a href="#" class="btn btn-default">Conhecer</a>
                <a href="#" class="btn btn-outlined">Contatar</a>

            </div>
        </section>
    </main>
    <!-- TRENDING -->

    <section id="trending">
        <h2 class="title">
            Em Alta
        </h2>

        <div class="trending-cards">
            <div class="trending-card">
                <img src="/dia1/images/trending/card1.png" alt="foto1">

                <div class="trending-rate">
                    <p>
                        5 <i class="fa-solid fa-star"></i>
                    </p>
                </div>

                <p class="trending-card-description">
                    Frapuccino
                    <span>Avelã</span>
                </p>
            </div>
            <div class="trending-card">
                <img src="/dia1/images/trending/card2.png" alt="foto1">

                <div class="trending-rate">
                    <p>
                        5 <i class="fa-solid fa-star"></i>
                    </p>
                </div>

                <p class="trending-card-description">
                    Frapuccino
                    <span>Pistache</span>
                </p>
            </div>
            <div class="trending-card">
                <img src="/dia1/images/trending/card3.png" alt="foto1">

                <div class="trending-rate">
                    <p>
                        5 <i class="fa-solid fa-star"></i>
                    </p>
                </div>

                <p class="trending-card-description">
                    Frapuccino
                    <span>Morango</span>
                </p>
            </div>
        </div>
    </section>
    <script src="/dia1/script.js"></script>
</body>

</html>
