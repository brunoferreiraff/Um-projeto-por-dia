<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado JS</title>
</head>

<body>
    <h1>Supermercado JS</h1>


    <form action="">
        <p>Produto: <input type="text" id="inNome" required></p>
        <p>Preço R$ : <input type="number" step="0.01" id="inPreco"></p>

        <input type="submit" value="Calcular Valor a Pagar">
    </form>

    <h3></h3>

    <script>
        const frm = document.querySelector("form");
        const resp = document.querySelector("h3");

        frm.addEventListener("submit", (e) => {
            e.preventDefault();
            const price = frm.inPreco.value;
            const name = frm.inNome.value;

            const promo = (price * 2) + (price * 0.5)


            resp.innerText = `${name} - Promoção: Leve 3 por R$ ${promo}`


        })



    </script>
</body>

</html>
