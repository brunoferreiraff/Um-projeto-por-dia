<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaciaJS</title>
</head>
<body>
    <h1>Farmacia JS</h1>
    <form action="">
    <p> Nome do Medicamento: <input type="text" id="inMedicamento" required></p>
    <p>Preço do Medicamento: R$<input type="number" id="inPreco" required min="0" step="0.01"></p>
    <input type="submit" value="Mostrar Preço">
    </form>

    <h3></h3>
    <h4></h4>

    <script>
        const frm = document.querySelector("form");
        const prm = document.querySelector("h3");
        const leve2 = document.querySelector("h4");

            frm.addEventListener("submit", (e) => {
            e.preventDefault()
            const preco = Number(frm.inPreco.value);
            const nome = frm.inMedicamento.value;

            const promo = Math.floor(preco * 2);

            prm.innerText = `Promoção de ${nome}`;
            leve2.innerText = `Leve 2 pagando apenas R$ ${promo}`;

            
        })
    </script>
</body>
</html>
