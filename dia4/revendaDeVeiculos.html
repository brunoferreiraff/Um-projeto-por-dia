<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenda de Veículos</title>
</head>

<body>
    <h1> Revenda de Veículos</h1>

    <form action="">
        <p>Digite o modelo do carro
            <input type="text" id="inCarro" required>
        </p>
        <p>Qual o valor do veículo?
            <input type="number" id="inPreco" required>
        </p>
        <input type="submit" value="Verificar condição">
    </form>

    <h3></h3>
    <h4></h4>
    <h5></h5>

    <script>
        const frm = document.querySelector("form");
        const resp1 = document.querySelector("h3");
        const resp2 = document.querySelector("h4");
        const resp3 = document.querySelector("h5");

        frm.addEventListener("submit", (e) => {
            const carro = frm.inCarro.value;
            const preco = Number(frm.inPreco.value);

            const entrada = preco / 2;
            const parcelamento = (preco - entrada) / 12

            resp1.innerText = carro;
            resp2.innerText = `O modelo ${carro} custa R$ ${preco}`
            resp3.innerText = `Você deve pagar R$ ${entrada} de entrada e parcelar o restante de 12x de R$ ${parcelamento.toFixed(2)}`

            e.preventDefault();
        })
    </script>
</body>

</html>
