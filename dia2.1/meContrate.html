<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site - Fale Conosco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      color: #333;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #3498db;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 4px;
      font-weight: bold;
    }

    nav a:hover, nav a.ativo {
      background-color: #2980b9;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    main h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .formulario label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #444;
    }

    .formulario input,
    .formulario textarea,
    .formulario select {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
    }

    .formulario textarea {
      height: 120px;
      resize: vertical;
    }

    .formulario button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    .formulario button:hover {
      background-color: #2980b9;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #2c3e50;
      color: #aaa;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Site do Bruno Ferreira - Trabalho desenvolvimento Web</h1>
  </header>

  <nav>
    <a href="index.html">Principal</a>
    <a href="sobre.html">Sobre</a>
    <a href="meContrate.html" class="ativo">me Contrate</a>
  </nav>

  <main>
    <h2>Me Contrate</h2>

    <form class="formulario" onsubmit="enviarFormulario(event)">

      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required>

      <label for="assunto">Assunto:</label>
      <select id="assunto" name="assunto" required>
        <option value="">Selecione um assunto</option>
        <option value="duvida">Dúvida</option>
        <option value="sugestao">Sugestão</option>
        <option value="elogio">Elogio</option>
        <option value="reclamacao">Reclamação</option>
      </select>

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>

      <button type="submit">Enviar Mensagem</button>
    </form>
  </main>

  <script>
    function enviarFormulario(event) {
      event.preventDefault();
      alert('Mensagem enviada');
      event.target.reset();
    }
  </script>

</body>
</html>
